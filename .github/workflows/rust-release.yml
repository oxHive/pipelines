name: Rust Release

on:
  workflow_call:
    inputs:
      package-name:
        description: Cargo package name used in Cargo.toml (for version verification)
        type: string
        required: true
      binary-name:
        description: Binary file name produced by `cargo build --release`
        type: string
        required: true
      dashboard-dir:
        description: Path to a bun-managed dashboard to build and embed before `cargo build --release` (e.g. `dashboard`). Leave empty to skip.
        type: string
        default: ""
    secrets:
      MATRIX_HOMESERVER:
        required: false
      MATRIX_USER:
        required: false
      MATRIX_PASSWORD:
        required: false
      MATRIX_ROOM_ID:
        required: false
      MATRIX_ALERT_ROOM_ID:
        required: false

jobs:
  verify-version:
    uses: oxHive/pipelines/.github/workflows/rust-verify-version.yml@main
    with:
      package-name: ${{ inputs.package-name }}

  check:
    needs: verify-version
    uses: oxHive/pipelines/.github/workflows/rust-check.yml@main

  build-binaries:
    needs: check
    uses: oxHive/pipelines/.github/workflows/rust-build-binaries.yml@main
    with:
      binary-name: ${{ inputs.binary-name }}
      dashboard-dir: ${{ inputs.dashboard-dir }}

  github-release:
    needs: build-binaries
    uses: oxHive/pipelines/.github/workflows/shared-github-release.yml@main
    secrets:
      MATRIX_HOMESERVER: ${{ secrets.MATRIX_HOMESERVER }}
      MATRIX_USER: ${{ secrets.MATRIX_USER }}
      MATRIX_PASSWORD: ${{ secrets.MATRIX_PASSWORD }}
      MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}

  publish-crates:
    needs: github-release
    uses: oxHive/pipelines/.github/workflows/rust-publish-crates.yml@main
    permissions:
      id-token: write
      contents: read

  notify-failure:
    needs: [verify-version, check, build-binaries, github-release, publish-crates]
    if: failure()
    runs-on: ubuntu-latest
    env:
      MATRIX_USER: ${{ secrets.MATRIX_USER }}
    steps:
      - name: Notify Matrix
        if: ${{ env.MATRIX_USER != '' }}
        continue-on-error: true
        uses: oxGrad/matrix-notify-action@v1
        with:
          homeserver: ${{ secrets.MATRIX_HOMESERVER }}
          user: ${{ secrets.MATRIX_USER }}
          password: ${{ secrets.MATRIX_PASSWORD }}
          room_id: ${{ secrets.MATRIX_ALERT_ROOM_ID }}
          format: markdown
          msgtype: m.text
          message: |
            Release pipeline failed for `${{ github.ref_name }}`: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
