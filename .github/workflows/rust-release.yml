name: Rust Release

on:
  workflow_call:
    inputs:
      package-name:
        description: Cargo package name used in Cargo.toml (for version verification)
        type: string
        required: true
      binary-name:
        description: Binary file name produced by `cargo build`
        type: string
        required: true
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: true

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "${{ inputs.package-name }}") | .version')
          if [ "$TAG" != "$CARGO" ]; then
            echo "Tag v$TAG does not match Cargo.toml version $CARGO"
            exit 1
          fi
          echo "Version check passed: $CARGO"

  build:
    needs: verify-version
    uses: oxHive/pipelines/.github/workflows/rust-build.yml@main

  build-binaries:
    needs: build
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          artifact="${{ inputs.binary-name }}-${{ matrix.target }}"
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ inputs.binary-name }} dist/
          tar -czf ${artifact}.tar.gz -C dist ${{ inputs.binary-name }}
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"
        id: package

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: ${{ steps.package.outputs.artifact }}.tar.gz

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGES.md
          files: artifacts/*.tar.gz

  publish-crates:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
