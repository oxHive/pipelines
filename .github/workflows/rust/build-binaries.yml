name: Rust Build Binaries

on:
  workflow_call:
    inputs:
      binary-name:
        description: Binary file name produced by `cargo build --release`
        type: string
        required: true

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          artifact="${{ inputs.binary-name }}-${{ matrix.target }}"
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ inputs.binary-name }} dist/
          tar -czf ${artifact}.tar.gz -C dist ${{ inputs.binary-name }}
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: ${{ steps.package.outputs.artifact }}.tar.gz
