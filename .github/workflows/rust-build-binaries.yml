name: Rust Build Binaries

on:
  workflow_call:
    inputs:
      binary-name:
        description: Binary file name produced by `cargo build --release`
        type: string
        required: true
      dashboard-dir:
        description: Path to a bun-managed dashboard to build and embed before `cargo build --release` (e.g. `dashboard`). Leave empty to skip.
        type: string
        default: ""

jobs:
  build-dashboard:
    if: inputs.dashboard-dir != ''
    uses: oxHive/pipelines/.github/workflows/bun-build.yml@main
    with:
      working-directory: ${{ inputs.dashboard-dir }}
      artifact-name: dashboard-dist

  build-binaries:
    needs: build-dashboard
    if: always() && !failure() && !cancelled()
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Download dashboard
        if: inputs.dashboard-dir != ''
        uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: ${{ inputs.dashboard-dir }}/dist

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          artifact="${{ inputs.binary-name }}-${{ matrix.target }}"
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ inputs.binary-name }} dist/
          tar -czf ${artifact}.tar.gz -C dist ${{ inputs.binary-name }}
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: ${{ steps.package.outputs.artifact }}.tar.gz
