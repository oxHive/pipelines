name: GitHub Release

on:
  workflow_call:
    secrets:
      MATRIX_HOMESERVER:
        required: false
      MATRIX_ACCESS_TOKEN:
        required: false
      MATRIX_ROOM_ID:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGES.md
          files: artifacts/*.tar.gz

      - name: Notify Matrix
        if: ${{ env.MATRIX_ACCESS_TOKEN != '' }}
        env:
          MATRIX_HOMESERVER: ${{ secrets.MATRIX_HOMESERVER }}
          MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}
        run: |
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          ENCODED_ROOM=$(jq -rn --arg r "${MATRIX_ROOM_ID}" '$r | @uri')
          BODY=$(jq -n \
            --arg body "Released ${{ github.ref_name }}: ${RELEASE_URL}" \
            --arg formatted "<b>${{ github.repository }}</b> released <a href=\"${RELEASE_URL}\">${{ github.ref_name }}</a>" \
            '{msgtype: "m.text", body: $body, format: "org.matrix.custom.html", formatted_body: $formatted}')
          curl -sf -X PUT \
            "${MATRIX_HOMESERVER}/_matrix/client/v3/rooms/${ENCODED_ROOM}/send/m.room.message/${{ github.run_id }}" \
            -H "Authorization: Bearer ${MATRIX_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${BODY}"
