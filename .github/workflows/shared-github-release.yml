name: GitHub Release

on:
  workflow_call:
    secrets:
      MATRIX_HOMESERVER:
        required: false
      MATRIX_USER:
        required: false
      MATRIX_PASSWORD:
        required: false
      MATRIX_ROOM_ID:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      MATRIX_USER: ${{ secrets.MATRIX_USER }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGES.md
          files: artifacts/*.tar.gz

      - name: Read changelog
        if: ${{ env.MATRIX_USER != '' }}
        id: changelog
        run: |
          {
            echo 'content<<EOF'
            cat CHANGES.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Notify Matrix
        if: ${{ env.MATRIX_USER != '' }}
        continue-on-error: true
        uses: oxGrad/matrix-notify-action@v1
        with:
          homeserver: ${{ secrets.MATRIX_HOMESERVER }}
          user: ${{ secrets.MATRIX_USER }}
          password: ${{ secrets.MATRIX_PASSWORD }}
          room_id: ${{ secrets.MATRIX_ROOM_ID }}
          format: markdown
          msgtype: m.text
          message: |
            Released [${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})

            ${{ steps.changelog.outputs.content }}
