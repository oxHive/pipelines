name: Rust Verify Version

on:
  workflow_call:
    inputs:
      package-name:
        description: Cargo package name used in Cargo.toml
        type: string
        required: true

jobs:
  verify-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "${{ inputs.package-name }}") | .version')
          if [ "$TAG" != "$CARGO" ]; then
            echo "Tag v$TAG does not match Cargo.toml version $CARGO"
            exit 1
          fi
          echo "Version check passed: $CARGO"
