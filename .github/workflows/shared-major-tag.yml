name: Shared Major Tag

on:
  workflow_call: {}

jobs:
  major-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v7

      - name: Move major version tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "'$TAG' is not a full semver tag (vX.Y.Z), skipping"
            exit 0
          fi
          MAJOR="${TAG%%.*}"
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force
